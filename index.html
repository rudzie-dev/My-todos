<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Todos</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f7f7f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Todos">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" href="/icon.png">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #f7f7f5;
  --card:   #ffffff;
  --text:   #111111;
  --sub:    #999999;
  --border: #ebebeb;
  --c1: #ff6b6b;
  --c2: #ffa94d;
  --c3: #51cf66;
  --c4: #339af0;
  --c5: #cc5de8;
  --c6: #f783ac;

  /* Spatial system — 4pt base */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 20px;
  --s6: 24px;
  --s8: 32px;
  --s10: 40px;
  --s12: 48px;

  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-full: 999px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
}

html { height: 100%; }

body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Page shell ── */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: var(--s12) var(--s4) var(--s12);
}

.wrap {
  width: 100%;
  max-width: 480px;
}

/* ── Header ── */
.hd {
  margin-bottom: var(--s2);
}

h1 {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--text);
}

.sub {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--sub);
  margin-top: var(--s1);
  margin-bottom: var(--s6);
  letter-spacing: 0.01em;
}

/* ── Add bar ── */
.add-bar {
  display: flex;
  align-items: center;
  gap: var(--s3);
  margin-bottom: var(--s5);
}

.add-bar input {
  flex: 1;
  height: 52px;
  padding: 0 var(--s5);
  border-radius: var(--r-full);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-family: 'Nunito', sans-serif;
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--text);
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.18s, box-shadow 0.18s;
  -webkit-appearance: none;
}

.add-bar input::placeholder {
  color: var(--sub);
  font-weight: 600;
}

.add-bar input:focus {
  border-color: var(--c4);
  box-shadow: 0 0 0 3px rgba(51,154,240,0.14), var(--shadow-sm);
}

.btn-add {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: 50%;
  border: none;
  background: var(--text);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  transition: transform 0.14s cubic-bezier(.34,1.56,.64,1), background 0.15s;
}

.btn-add:hover  { background: #2a2a2a; transform: scale(1.08); }
.btn-add:active { transform: scale(0.92); }

/* ── List ── */
.list {
  display: flex;
  flex-direction: column;
  gap: var(--s2);
}

.item {
  display: flex;
  align-items: center;
  gap: var(--s4);
  background: var(--card);
  border-radius: var(--r-lg);
  padding: var(--s4) var(--s4) var(--s4) var(--s4);
  box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--border);
  transition: opacity 0.22s, transform 0.22s;
  animation: pop-in 0.26s cubic-bezier(.34,1.56,.64,1) both;
  min-height: 60px;
}

@keyframes pop-in {
  from { opacity: 0; transform: scale(0.92) translateY(4px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

.item.done {
  opacity: 0.42;
}

.item.done .label {
  text-decoration: line-through;
  color: var(--sub);
}

/* ── Circle ── */
.circle {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid currentColor;
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.16s, transform 0.14s cubic-bezier(.34,1.56,.64,1);
  padding: 0;
}

.circle:hover  { transform: scale(1.14); }
.circle:active { transform: scale(0.9); }
.circle.checked { background: currentColor; border-color: currentColor; }
.circle.checked svg { stroke: #fff !important; }

/* ── Label ── */
.label {
  flex: 1;
  font-size: 0.9375rem;
  font-weight: 700;
  line-height: 1.4;
  cursor: text;
  word-break: break-word;
  color: var(--text);
  user-select: none;
}

.edit-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9375rem;
  font-weight: 700;
  color: var(--text);
  caret-color: var(--c4);
  padding: 0;
}

/* ── Delete btn ── */
.btn-del {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: none;
  color: var(--sub);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.14s, background 0.14s;
  opacity: 0;
  pointer-events: none;
}

.item:hover .btn-del,
.item:focus-within .btn-del {
  opacity: 1;
  pointer-events: all;
}

/* Always show on touch devices */
@media (hover: none) {
  .btn-del { opacity: 1; pointer-events: all; }
}

.btn-del:hover { color: var(--c1); background: rgba(255,107,107,0.1); }

/* ── Empty state ── */
.empty {
  text-align: center;
  color: var(--sub);
  font-size: 0.875rem;
  font-weight: 600;
  padding: var(--s12) 0 var(--s8);
  letter-spacing: 0.01em;
}

/* ── Desktop ── */
@media (min-width: 768px) {
  .page {
    padding: 72px var(--s8) 72px;
    align-items: flex-start;
  }

  .wrap {
    max-width: 600px;
  }

  h1 {
    font-size: 2.5rem;
  }

  .sub {
    font-size: 0.875rem;
    margin-bottom: var(--s8);
  }

  .add-bar {
    gap: var(--s4);
    margin-bottom: var(--s6);
  }

  .add-bar input {
    height: 58px;
    font-size: 1rem;
    padding: 0 var(--s6);
  }

  .btn-add {
    width: 58px;
    height: 58px;
  }

  .item {
    padding: var(--s4) var(--s5);
    gap: var(--s5);
    border-radius: var(--r-xl);
  }

  .circle {
    width: 30px;
    height: 30px;
  }

  .label, .edit-input {
    font-size: 1rem;
  }

  .list { gap: var(--s3); }
}

/* ── Install banner ── */
#install-banner {
  position: fixed;
  top: var(--s4);
  right: var(--s4);
  background: #111;
  color: #fff;
  border-radius: var(--r-xl);
  padding: var(--s4) var(--s4) var(--s4) var(--s5);
  display: flex;
  align-items: center;
  gap: var(--s3);
  box-shadow: var(--shadow-lg);
  font-size: 0.8125rem;
  font-weight: 700;
  z-index: 999;
  max-width: 300px;
  opacity: 0;
  transform: translateY(-10px) scale(0.96);
  transition: opacity 0.28s ease, transform 0.28s cubic-bezier(.34,1.4,.64,1);
  pointer-events: none;
}

#install-banner.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

#install-banner .b-icon { display: flex; flex-shrink: 0; color: var(--c4); }
#install-banner .b-text { flex: 1; line-height: 1.35; }
#install-banner .b-text small {
  display: block;
  font-weight: 600;
  color: #666;
  font-size: 0.7rem;
  margin-top: 2px;
}

#btn-install {
  background: var(--c4);
  color: #fff;
  border: none;
  border-radius: var(--r-full);
  padding: 6px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity 0.14s, transform 0.14s;
}

#btn-install:hover { opacity: 0.85; transform: scale(1.04); }

#btn-dismiss {
  background: none;
  border: none;
  color: #555;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--s1);
  flex-shrink: 0;
  border-radius: 50%;
  transition: color 0.14s;
}

#btn-dismiss:hover { color: #fff; }

/* ── iOS tip ── */
#ios-tip {
  position: fixed;
  top: var(--s4);
  right: var(--s4);
  background: #111;
  color: #fff;
  border-radius: var(--r-xl);
  padding: var(--s5) var(--s5);
  font-size: 0.8125rem;
  font-weight: 600;
  line-height: 1.6;
  z-index: 999;
  max-width: 240px;
  box-shadow: var(--shadow-lg);
  display: none;
}

#ios-tip.show {
  display: block;
  animation: pop-in 0.26s cubic-bezier(.34,1.56,.64,1) both;
}

#ios-tip strong { font-weight: 800; }

#ios-tip .close {
  display: block;
  margin-top: var(--s3);
  text-align: right;
  color: var(--c4);
  cursor: pointer;
  font-weight: 800;
  font-size: 0.8rem;
}
</style>
</head>
<body>

<div id="install-banner">
  <span class="b-icon" id="banner-icon"></span>
  <div class="b-text">
    Add to your device
    <small>Works offline too</small>
  </div>
  <button id="btn-install">Add</button>
  <button id="btn-dismiss"></button>
</div>

<div id="ios-tip">
  <strong>Add to Home Screen</strong><br>
  Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong>
  <span class="close" id="ios-close">Got it</span>
</div>

<div class="page">
  <div class="wrap">
    <div class="hd">
      <h1>My Todos</h1>
    </div>
    <p class="sub" id="sub">loading…</p>

    <div class="add-bar">
      <input id="new-input" type="text" placeholder="what needs doing?" maxlength="120" autocomplete="off">
      <button class="btn-add" id="btn-add" title="Add"></button>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

/* ── Icons ── */
function mkIcon(name, size) {
  const s = document.createElement('span');
  s.dataset.lucide = name;
  s.style.cssText = `display:flex;width:${size}px;height:${size}px;pointer-events:none`;
  return s;
}

function initStaticIcons() {
  document.getElementById('btn-add').appendChild(mkIcon('plus', 22));
  document.getElementById('banner-icon').appendChild(mkIcon('smartphone', 18));
  document.getElementById('btn-dismiss').appendChild(mkIcon('x', 15));
  lucide.createIcons();
}

/* ── Install banner ── */
const banner = document.getElementById('install-banner');
const iosTip = document.getElementById('ios-tip');
let deferredPrompt = null;

const isIOS        = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
const dismissed    = sessionStorage.getItem('install-dismissed');

if (!isStandalone && !dismissed) {
  if (isIOS) {
    setTimeout(() => iosTip.classList.add('show'), 2000);
  } else {
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => banner.classList.add('show'), 2000);
    });
  }
}

document.getElementById('btn-install').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
  if (outcome === 'accepted') sessionStorage.setItem('install-dismissed', '1');
};

document.getElementById('btn-dismiss').onclick = () => {
  banner.classList.remove('show');
  sessionStorage.setItem('install-dismissed', '1');
};

document.getElementById('ios-close').onclick = () => {
  iosTip.classList.remove('show');
  sessionStorage.setItem('install-dismissed', '1');
};

/* ── App ── */
const COLORS = ['--c1','--c2','--c3','--c4','--c5','--c6'];
let todos = JSON.parse(localStorage.getItem('todos') || '[]');

const listEl = document.getElementById('list');
const input  = document.getElementById('new-input');
const subEl  = document.getElementById('sub');

function colorFor(i) {
  return getComputedStyle(document.documentElement).getPropertyValue(COLORS[i % COLORS.length]).trim();
}

function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

function updateSub() {
  const left = todos.filter(t => !t.done).length;
  subEl.textContent = todos.length === 0
    ? 'nothing here yet'
    : left === 0
      ? 'all done 🎉'
      : `${left} remaining`;
}

function render() {
  listEl.innerHTML = '';

  if (!todos.length) {
    listEl.innerHTML = '<p class="empty">Add your first todo above ↑</p>';
    updateSub();
    return;
  }

  todos.forEach((t, i) => {
    const color = colorFor(i);
    const div = document.createElement('div');
    div.className = 'item' + (t.done ? ' done' : '');

    const circle = document.createElement('button');
    circle.className = 'circle' + (t.done ? ' checked' : '');
    circle.style.color = color;
    circle.setAttribute('aria-label', t.done ? 'Mark undone' : 'Mark done');
    if (t.done) circle.appendChild(mkIcon('check', 13));
    circle.onclick = () => { t.done = !t.done; save(); render(); };

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = t.text;
    label.ondblclick = () => startEdit(i, div);
    label.ontouchstart = (() => {
      let timer;
      return () => {
        timer = setTimeout(() => startEdit(i, div), 500);
        label.ontouchend = () => clearTimeout(timer);
      };
    })();

    const del = document.createElement('button');
    del.className = 'btn-del';
    del.setAttribute('aria-label', 'Delete');
    del.appendChild(mkIcon('trash-2', 15));
    del.onclick = () => {
      div.style.opacity = '0';
      div.style.transform = 'scale(0.9)';
      setTimeout(() => { todos.splice(i, 1); save(); render(); }, 200);
    };

    div.append(circle, label, del);
    listEl.appendChild(div);
  });

  lucide.createIcons();
  updateSub();
}

function startEdit(i, div) {
  const labelEl = div.querySelector('.label');
  const ei = document.createElement('input');
  ei.className = 'edit-input';
  ei.value = todos[i].text;
  labelEl.replaceWith(ei);
  ei.focus();
  ei.select();
  const commit = () => {
    const v = ei.value.trim();
    if (v) todos[i].text = v;
    save(); render();
  };
  ei.onblur = commit;
  ei.onkeydown = e => {
    if (e.key === 'Enter') ei.blur();
    if (e.key === 'Escape') render();
  };
}

function addTodo() {
  const text = input.value.trim();
  if (!text) return;
  todos.push({ text, done: false });
  input.value = '';
  save();
  render();
  const btn = document.getElementById('btn-add');
  btn.style.transform = 'scale(1.18)';
  setTimeout(() => btn.style.transform = '', 180);
}

document.getElementById('btn-add').onclick = addTodo;
input.onkeydown = e => { if (e.key === 'Enter') addTodo(); };

window.addEventListener('load', () => { initStaticIcons(); render(); });
</script>
</body>
</html>
